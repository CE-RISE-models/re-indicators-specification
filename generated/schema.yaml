classes:
  IndicatorProductConfiguration:
    name: IndicatorProductConfiguration
    definition_uri: https://ce-rise-models.codeberg.page/re-indicators-specification//IndicatorProductConfiguration
    description: Configuration linking an indicator to a product with specific parameters
    from_schema: https://ce-rise-models.codeberg.page/re-indicators-specification/
    slots:
    - indicatorProductConfiguration__id
    - indicatorProductConfiguration__indicator_type
    - indicatorProductConfiguration__product_category
    - indicatorProductConfiguration__name
    - indicatorProductConfiguration__description
    - indicatorProductConfiguration__parameter_applications
    attributes:
      id:
        name: id
        description: Unique ID like "REcycle_PV"
        identifier: true
        range: string
        required: true
      indicator_type:
        name: indicator_type
        description: Type of indicator (REcycle, REuse, etc.)
        range: IndicatorType
        required: true
      product_category:
        name: product_category
        description: Product category this applies to
        range: ProductCategoryType
        required: true
      name:
        name: name
        range: string
        required: true
      description:
        name: description
        range: string
      parameter_applications:
        name: parameter_applications
        description: Parameters with their weights for this product
        range: ParameterApplication
        multivalued: true
        inlined: true
    class_uri: re_ind:IndicatorProductConfiguration
  ParameterApplication:
    name: ParameterApplication
    definition_uri: https://ce-rise-models.codeberg.page/re-indicators-specification//ParameterApplication
    description: Application of a parameter to a specific product with its weight
    from_schema: https://ce-rise-models.codeberg.page/re-indicators-specification/
    slots:
    - parameterApplication__parameter_ref
    - parameterApplication__weight
    - parameterApplication__applicable_questions
    attributes:
      parameter_ref:
        name: parameter_ref
        description: Reference to a ParameterSpecification
        range: string
        required: true
      weight:
        name: weight
        description: Weight of this parameter for this product
        range: float
        required: true
        minimum_value: 0.0
        maximum_value: 1.0
      applicable_questions:
        name: applicable_questions
        description: IDs of questions from the parameter that apply to this product
        range: string
        multivalued: true
    class_uri: re_ind:ParameterApplication
  ParameterSpecification:
    name: ParameterSpecification
    definition_uri: https://ce-rise-models.codeberg.page/re-indicators-specification//ParameterSpecification
    description: A parameter within an indicator with its questions
    from_schema: https://ce-rise-models.codeberg.page/re-indicators-specification/
    abstract: true
    slots:
    - parameterSpecification__id
    - parameterSpecification__name
    - parameterSpecification__description
    - parameterSpecification__weight
    - parameterSpecification__is_bonus
    - parameterSpecification__questions
    attributes:
      id:
